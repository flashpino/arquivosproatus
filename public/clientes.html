<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CPD Monitor | Clientes</title>
  <script>if (!localStorage.getItem('cpd_token')) { document.documentElement.style.display='none'; location.replace('/login.html'); }</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body class="font-display min-h-screen grid-bg" style="background:#f1f5f9;color:#1e293b">
  <div class="flex flex-col min-h-screen">
    <div id="site-header"></div>

    <main class="p-6 space-y-4 max-w-screen-2xl mx-auto w-full flex-1">

      <!-- Page header -->
      <div class="flex items-center justify-between">
        <h3 class="text-xs font-bold uppercase tracking-widest flex items-center gap-2" style="color:#1e293b">
          <span class="material-symbols-outlined text-sm" style="color:#2563eb">groups</span> Gerenciar Clientes
        </h3>
        <button onclick="openNewModal()"
                class="flex items-center gap-2 px-4 py-2 rounded text-xs font-bold uppercase tracking-widest text-white shadow-sm transition-colors"
                style="background:#2563eb">
          <span class="material-symbols-outlined text-sm">add</span> Novo Cliente
        </button>
      </div>

      <!-- Table -->
      <div class="bg-white border rounded shadow-sm overflow-hidden" style="border-color:#cbd5e1">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr style="background:#f8fafc;border-bottom:1px solid #e2e8f0">
              <th class="p-4" style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em">ID</th>
              <th class="p-4" style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em">Nome / Empresa</th>
              <th class="p-4" style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em">E-mail</th>
              <th class="p-4" style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em">Plano</th>
              <th class="p-4" style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em">Thresholds padrão</th>
              <th class="p-4" style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em">Status</th>
              <th class="p-4 text-right" style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.08em">Ações</th>
            </tr>
          </thead>
          <tbody id="clients-tbody" class="text-sm divide-y" style="divide-color:#e2e8f0">
            <tr><td colspan="7" class="p-8 text-center text-sm" style="color:#94a3b8">Carregando…</td></tr>
          </tbody>
        </table>
      </div>

    </main>

    <footer class="border-t p-4 mt-auto" style="border-color:#e2e8f0;background:#fff">
      <div class="flex justify-between items-center max-w-screen-2xl mx-auto" style="color:#94a3b8;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em">
        <span>&copy; <span id="year"></span> CPD Monitor</span>
        <span class="flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:11px">terminal</span> Admin v1.0</span>
      </div>
    </footer>
  </div>

  <!-- ═══ Modal Criar/Editar ════════════════════════════════ -->
  <div id="modal-client" class="modal-overlay hidden">
    <div class="modal-box p-6">
      <div class="flex items-center justify-between mb-5">
        <h4 class="text-sm font-bold uppercase tracking-widest" style="color:#1e293b" id="modal-client-title">Novo Cliente</h4>
        <button onclick="closeModal('modal-client')" style="color:#94a3b8">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <form id="client-form" onsubmit="handleSaveClient(event)" class="space-y-4">
        <input type="hidden" id="client-id"/>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">Nome / Razão Social *</label>
            <input type="text" id="client-name" required class="input-premium" placeholder="Ex: Empresa XYZ Ltda"/>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">CNPJ / CPF</label>
            <input type="text" id="client-document" class="input-premium" placeholder="00.000.000/0001-00"/>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">E-mail</label>
            <input type="email" id="client-email" class="input-premium" placeholder="ti@empresa.com"/>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">Telefone</label>
            <input type="text" id="client-phone" class="input-premium" placeholder="(11) 99999-9999"/>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">Plano</label>
            <select id="client-plan" class="input-premium">
              <option value="basic">Basic</option>
              <option value="standard" selected>Standard</option>
              <option value="enterprise">Enterprise</option>
            </select>
          </div>
        </div>

        <!-- Thresholds -->
        <div class="pt-3" style="border-top:1px solid #e2e8f0">
          <p class="text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-1" style="color:#334155">
            <span class="material-symbols-outlined text-sm">thermostat</span> Thresholds Padrão (herdados pelos CPDs)
          </p>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">Temp. Máx. (°C)</label>
              <input type="number" step="0.1" id="client-temp-max" class="input-premium" value="27"/>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">Temp. Mín. (°C)</label>
              <input type="number" step="0.1" id="client-temp-min" class="input-premium" value="16"/>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">Umidade Máx. (%)</label>
              <input type="number" step="0.1" id="client-hum-max" class="input-premium" value="70"/>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color:#475569">Umidade Mín. (%)</label>
              <input type="number" step="0.1" id="client-hum-min" class="input-premium" value="30"/>
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-2" style="border-top:1px solid #f1f5f9">
          <button type="button" onclick="closeModal('modal-client')"
                  class="px-4 py-2 rounded text-xs font-bold uppercase tracking-widest transition-colors"
                  style="background:#f1f5f9;color:#475569">Cancelar</button>
          <button type="submit" id="client-save-btn"
                  class="flex items-center gap-2 px-5 py-2 rounded text-xs font-bold uppercase tracking-widest text-white shadow-sm"
                  style="background:#2563eb">
            <span class="material-symbols-outlined text-sm">save</span> Salvar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    let clients = [];

    function rowHtml(c, idx) {
      const plan = { basic:'Basic', standard:'Standard', enterprise:'Enterprise' }[c.plan] || c.plan;
      return `
        <tr class="staggered-row hover-glow-row" style="animation-delay:${idx*0.035}s">
          <td class="p-4 font-mono text-xs" style="color:#64748b">${c.id}</td>
          <td class="p-4">
            <div class="flex flex-col">
              <span class="font-bold" style="color:#1e293b">${c.name}</span>
              ${c.document ? `<span class="text-xs" style="color:#64748b">${c.document}</span>` : ''}
            </div>
          </td>
          <td class="p-4 text-xs" style="color:#64748b">${c.email || '—'}</td>
          <td class="p-4">
            <span class="px-2 py-0.5 rounded text-xs font-bold uppercase tracking-widest"
                  style="background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe">${plan}</span>
          </td>
          <td class="p-4 font-mono text-xs" style="color:#475569">
            ${c.default_temp_min}–${c.default_temp_max} °C / ${c.default_humidity_min}–${c.default_humidity_max} %
          </td>
          <td class="p-4">${activeBadge(c.active)}</td>
          <td class="p-4 text-right">
            <div class="flex items-center justify-end gap-2">
              <button onclick="openEditModal(${c.id})" class="p-1 transition-colors" style="color:#94a3b8" title="Editar">
                <span class="material-symbols-outlined text-sm">edit</span>
              </button>
              <button onclick="toggleActive(${c.id}, ${c.active})" class="p-1 transition-colors" style="color:#94a3b8"
                      title="${c.active ? 'Desativar' : 'Ativar'}">
                <span class="material-symbols-outlined text-sm">${c.active ? 'toggle_on' : 'toggle_off'}</span>
              </button>
              <button onclick="deleteClient(${c.id})" class="p-1 transition-colors" style="color:#94a3b8" title="Excluir">
                <span class="material-symbols-outlined text-sm">delete</span>
              </button>
            </div>
          </td>
        </tr>`;
    }

    async function loadClients() {
      try {
        clients = await api.getClients();
        const tbody = document.getElementById('clients-tbody');
        tbody.innerHTML = clients.length
          ? clients.map((c, i) => rowHtml(c, i)).join('')
          : `<tr><td colspan="7" class="p-8 text-center text-sm" style="color:#94a3b8">Nenhum cliente cadastrado.</td></tr>`;
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function openNewModal() {
      document.getElementById('modal-client-title').textContent = 'Novo Cliente';
      document.getElementById('client-id').value       = '';
      document.getElementById('client-name').value     = '';
      document.getElementById('client-document').value = '';
      document.getElementById('client-email').value    = '';
      document.getElementById('client-phone').value    = '';
      document.getElementById('client-plan').value     = 'standard';
      document.getElementById('client-temp-max').value = '27';
      document.getElementById('client-temp-min').value = '16';
      document.getElementById('client-hum-max').value  = '70';
      document.getElementById('client-hum-min').value  = '30';
      openModal('modal-client');
    }

    function openEditModal(id) {
      const c = clients.find(x => x.id === id);
      if (!c) return;
      document.getElementById('modal-client-title').textContent = 'Editar Cliente';
      document.getElementById('client-id').value       = c.id;
      document.getElementById('client-name').value     = c.name || '';
      document.getElementById('client-document').value = c.document || '';
      document.getElementById('client-email').value    = c.email || '';
      document.getElementById('client-phone').value    = c.phone || '';
      document.getElementById('client-plan').value     = c.plan || 'standard';
      document.getElementById('client-temp-max').value = c.default_temp_max || 27;
      document.getElementById('client-temp-min').value = c.default_temp_min || 16;
      document.getElementById('client-hum-max').value  = c.default_humidity_max || 70;
      document.getElementById('client-hum-min').value  = c.default_humidity_min || 30;
      openModal('modal-client');
    }

    async function handleSaveClient(e) {
      e.preventDefault();
      const id  = document.getElementById('client-id').value;
      const btn = document.getElementById('client-save-btn');
      btn.disabled = true;

      const payload = {
        name:                   document.getElementById('client-name').value.trim(),
        document:               document.getElementById('client-document').value.trim() || null,
        email:                  document.getElementById('client-email').value.trim() || null,
        phone:                  document.getElementById('client-phone').value.trim() || null,
        plan:                   document.getElementById('client-plan').value,
        default_temp_max:       parseFloat(document.getElementById('client-temp-max').value),
        default_temp_min:       parseFloat(document.getElementById('client-temp-min').value),
        default_humidity_max:   parseFloat(document.getElementById('client-hum-max').value),
        default_humidity_min:   parseFloat(document.getElementById('client-hum-min').value),
      };

      try {
        if (id) {
          await api.updateClient(id, payload);
          showToast('Cliente atualizado com sucesso!');
        } else {
          await api.createClient(payload);
          showToast('Cliente criado com sucesso!');
        }
        closeModal('modal-client');
        loadClients();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    async function toggleActive(id, current) {
      try {
        await api.updateClient(id, { active: current ? 0 : 1 });
        showToast(current ? 'Cliente desativado.' : 'Cliente ativado.');
        loadClients();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteClient(id) {
      if (!confirm('Deseja desativar este cliente? Todos os seus CPDs e sensores serão afetados.')) return;
      try {
        await api.deleteClient(id);
        showToast('Cliente removido.');
        loadClients();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    loadClients();
  </script>
</body>
</html>
